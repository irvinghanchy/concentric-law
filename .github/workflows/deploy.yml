# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  # 觸發條件：當推送到 main 分支時
  push:
    branches: [ main ]
  # 允許手動從 Actions 頁籤觸發
  workflow_dispatch:

# 權限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只能執行一個部署任務
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      # 自動偵測並安裝依賴 (npm, pnpm, yarn)
      - name: Install, build, and upload your site
        uses: withastro/action@v2
        # 注意：如果您沒有使用 pnpm，Astro 會自動改用 npm
        # 若您希望強制使用特定套件管理器，可查閱 withastro/action 文件

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4